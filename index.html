<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Nucs AI — Terminology</title>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<style>
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-Book.otf') format('opentype'); font-weight: 350; font-style: normal; }
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-SemiBold.otf') format('opentype'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'Axiforma'; src: url('assets/fonts/Axiforma-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

  :root {
    --teal: #066979;
    --teal-soft: #e6f0f2;
    --dark: #1A1A1A;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #ffffff;
    --bg-soft: #f9fafb;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Axiforma', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--dark);
    font-weight: 350;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  .header { border-bottom: 1px solid var(--border); background: #fff; padding: 28px 48px 20px; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .logo-wrap { display: flex; align-items: center; gap: 16px; }
  .logo { height: 36px; width: auto; }
  .title-block h1 { margin: 0; font-weight: 500; font-size: 22px; color: var(--dark); letter-spacing: -0.01em; }
  .title-block .sub { font-size: 13px; color: var(--muted); font-weight: 350; margin-top: 2px; }
  .stat { font-size: 13px; color: var(--muted); font-weight: 400; }
  .stat strong { color: var(--teal); font-weight: 600; }

  .search-section { background: var(--bg-soft); border-bottom: 1px solid var(--border); padding: 28px 48px; position: sticky; top: 0; z-index: 10; }
  .search-inner { max-width: 1200px; margin: 0 auto; position: relative; }
  .search-input {
    width: 100%; padding: 16px 20px 16px 52px;
    font-family: inherit; font-size: 16px; font-weight: 400;
    border: 1px solid var(--border); border-radius: 10px;
    background: #fff; color: var(--dark);
    transition: border-color 0.15s, box-shadow 0.15s; outline: none;
  }
  .search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(6, 105, 121, 0.12); }
  .search-input::placeholder { color: #9ca3af; font-weight: 350; }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 6px 10px; font-size: 12px; font-family: inherit; border-radius: 6px; display: none; }
  .search-clear:hover { background: var(--border); color: var(--dark); }
  .search-hint { margin-top: 10px; font-size: 12px; color: var(--muted); font-weight: 350; }

  .tabs-wrap { border-bottom: 1px solid var(--border); background: #fff; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs { max-width: 1200px; margin: 0 auto; padding: 0 48px; display: flex; gap: 4px; white-space: nowrap; }
  .tab { padding: 16px 18px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; font-family: inherit; font-size: 14px; font-weight: 400; color: var(--muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--dark); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 500; }

  .content { max-width: 1200px; margin: 0 auto; padding: 40px 48px 80px; }
  .section-heading { font-size: 28px; font-weight: 500; color: var(--dark); margin: 0 0 8px; letter-spacing: -0.01em; }
  .section-sub { font-size: 14px; color: var(--muted); margin: 0 0 28px; }

  .term-grid { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .term-row { display: grid; grid-template-columns: 240px 1fr; gap: 32px; padding: 20px 24px; background: #fff; align-items: start; }
  .term-row.with-badge { grid-template-columns: 240px 1fr 160px; }
  .term-name { font-weight: 500; color: var(--teal); font-size: 15px; line-height: 1.5; }
  .term-def { font-size: 14.5px; line-height: 1.6; color: var(--dark); font-weight: 350; }
  .badge { justify-self: end; padding: 4px 10px; background: var(--teal-soft); color: var(--teal); font-size: 11px; font-weight: 500; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }

  .empty { padding: 60px 24px; text-align: center; color: var(--muted); font-size: 15px; }
  .empty strong { color: var(--dark); font-weight: 500; }

  .footer { border-top: 1px solid var(--border); padding: 24px 48px; text-align: center; font-size: 12px; color: var(--muted); }
  .footer a { color: var(--teal); text-decoration: none; font-weight: 400; }

  mark { background: rgba(6, 105, 121, 0.15); color: var(--teal); padding: 0 2px; border-radius: 2px; font-weight: 500; }

  .loader { padding: 80px 24px; text-align: center; color: var(--muted); font-size: 14px; }
  .loader-spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .header, .search-section, .content { padding-left: 20px; padding-right: 20px; }
    .tabs { padding: 0 20px; }
    .footer { padding-left: 20px; padding-right: 20px; }
    .term-row { grid-template-columns: 1fr; gap: 6px; padding: 16px 18px; }
    .term-row.with-badge { grid-template-columns: 1fr; }
    .badge { justify-self: start; margin-top: 6px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    .section-heading { font-size: 22px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="Nucs AI" class="logo" />
      <div class="title-block">
        <h1>Terminology</h1>
        <div class="sub">A reference glossary for nuclear medicine, theranostics, and Nucs AI</div>
      </div>
    </div>
    <div class="stat"><strong id="termCount">—</strong> terms</div>
  </div>
</header>

<section class="search-section">
  <div class="search-inner">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="search" class="search-input" type="text" placeholder="Search terms — try 'pluvicto', 'fda clearance', 'tumour staging'..." autocomplete="off" disabled />
    <button id="searchClear" class="search-clear" type="button">Clear</button>
    <div class="search-hint">Smart search: handles typos, abbreviations, and related terms (e.g. "lutetium" finds Pluvicto, "FDA approval" finds 510(k)).</div>
  </div>
</section>

<nav class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</nav>

<main class="content" id="content">
  <div class="loader">
    <div class="loader-spinner"></div>
    <div>Loading terms…</div>
  </div>
</main>

<footer class="footer">
  Nucs AI · Internal Reference · Edits made in <a href="https://www.notion.so/940438d6b6b24518b12871b28fb8715e" target="_blank">Notion</a> ·
  <span id="lastSynced"></span>
</footer>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
// To change the data source URL, edit only this constant.
// To change where this page lives, just move the entire repo —
// terms.json and assets/ are loaded relative to this HTML file.
const CONFIG = {
  TERMS_URL: 'terms.json',
  SEARCH_THRESHOLD: 0.4 // 0 = exact, 1 = match anything
};

// ============================================================
// APP
// ============================================================
let TERMS = [];
let CATEGORIES = [];
let activeCategory = null;
let fuse = null;

const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const searchEl = document.getElementById('search');
const searchClearEl = document.getElementById('searchClear');
const termCountEl = document.getElementById('termCount');
const lastSyncedEl = document.getElementById('lastSynced');

async function load() {
  try {
    const res = await fetch(CONFIG.TERMS_URL + '?t=' + Date.now(), { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    TERMS = data.terms || [];
    CATEGORIES = data.categories && data.categories.length ? data.categories : [...new Set(TERMS.map(t => t.category))];
    activeCategory = CATEGORIES[0];
    termCountEl.textContent = TERMS.length;
    if (data.lastSynced) {
      const d = new Date(data.lastSynced);
      lastSyncedEl.textContent = 'Last synced ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    fuse = new Fuse(TERMS, {
      keys: [
        { name: 'term', weight: 0.5 },
        { name: 'synonyms', weight: 0.3 },
        { name: 'def', weight: 0.2 }
      ],
      threshold: CONFIG.SEARCH_THRESHOLD,
      ignoreLocation: true, includeScore: true, minMatchCharLength: 2
    });
    searchEl.disabled = false;
    renderTabs();
    renderCategory();
  } catch (err) {
    contentEl.innerHTML = `
      <div class="empty">
        <strong>Couldn't load terms</strong>
        <div style="margin-top:8px;font-size:13px;">${err.message}. Check that <code>${CONFIG.TERMS_URL}</code> is reachable.</div>
      </div>`;
  }
}

function renderTabs() {
  tabsEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      searchEl.value = '';
      searchClearEl.style.display = 'none';
      renderTabs();
      renderCategory();
    });
    tabsEl.appendChild(btn);
  });
}

function renderCategory() {
  const items = TERMS.filter(t => t.category === activeCategory);
  contentEl.innerHTML = `
    <h2 class="section-heading">${escapeHtml(activeCategory)}</h2>
    <p class="section-sub">${items.length} term${items.length === 1 ? '' : 's'}</p>
    <div class="term-grid">
      ${items.map(t => `
        <div class="term-row">
          <div class="term-name">${escapeHtml(t.term)}</div>
          <div class="term-def">${escapeHtml(t.def)}</div>
        </div>
      `).join('')}
    </div>`;
}

function renderSearch(query) {
  const results = fuse.search(query);
  if (results.length === 0) {
    contentEl.innerHTML = `
      <div class="empty">
        <strong>No matches for "${escapeHtml(query)}"</strong>
        <div style="margin-top:8px;font-size:13px;">Try a different spelling, related word, or browse by category above.</div>
      </div>`;
    return;
  }
  const re = buildHighlightRegex(query);
  contentEl.innerHTML = `
    <h2 class="section-heading">Search results</h2>
    <p class="section-sub">${results.length} match${results.length === 1 ? '' : 'es'} for "${escapeHtml(query)}"</p>
    <div class="term-grid">
      ${results.map(r => {
        const t = r.item;
        return `
          <div class="term-row with-badge">
            <div class="term-name">${highlight(t.term, re)}</div>
            <div class="term-def">${highlight(t.def, re)}</div>
            <span class="badge">${escapeHtml(t.category)}</span>
          </div>`;
      }).join('')}
    </div>`;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function buildHighlightRegex(query) {
  const tokens = query.trim().split(/\s+/).filter(t => t.length >= 2);
  if (tokens.length === 0) return null;
  const escaped = tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return new RegExp('(' + escaped.join('|') + ')', 'gi');
}
function highlight(text, re) {
  const safe = escapeHtml(text);
  if (!re) return safe;
  return safe.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchEl.addEventListener('input', (e) => {
  const q = e.target.value.trim();
  searchClearEl.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (q.length === 0) { renderTabs(); renderCategory(); }
    else if (q.length >= 2) { renderSearch(q); }
  }, 120);
});

searchClearEl.addEventListener('click', () => {
  searchEl.value = '';
  searchClearEl.style.display = 'none';
  renderTabs();
  renderCategory();
  searchEl.focus();
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
  } else if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    searchClearEl.style.display = 'none';
    renderTabs();
    renderCategory();
    searchEl.blur();
  }
});

load();
</script>

</body>
</html>
